<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>生成AI一括検索</title>
  <link rel="stylesheet" href="generative.css">
</head>

<body>
  <h1>生成AI一括検索</h1>

  <div class="main-layout">

    <!-- ─── 左カラム：送信先 ─────────────────────────────── -->
    <div class="send-panel">
      <!-- 送信先チェックボックス -->
      <div class="destination-label">送信先</div>
      <div class="destination-group">
        <label>
          <input type="checkbox" id="chk-gemini" value="gemini" checked>
          Gemini
        </label>
        <label>
          <input type="checkbox" id="chk-chatgpt" value="chatgpt" checked>
          ChatGPT
        </label>
        <label>
          <input type="checkbox" id="chk-claude" value="claude" checked>
          Claude
        </label>
        <label>
          <input type="checkbox" id="chk-perplexity" value="perplexity" checked>
          Perplexity
        </label>
        <!-- 将来追加するサービスはここに <label> を追加するだけ -->
      </div>

      <textarea id="input-area" placeholder="ここに入力してください"></textarea>
      <div class="btn-row">
        <button id="submit-btn">送信</button>
        <button id="retry-btn" disabled>再取得</button>
      </div>
      <div id="status"></div>
    </div>

    <!-- ─── 右カラム：まとめ ───────────────────────────────── -->
    <div class="summary-panel">
      <!-- まとめ先チェックボックス -->
      <div class="destination-label">まとめる</div>
      <div class="destination-group summary-destination-group">
        <label>
          <input type="checkbox" id="chk-summary-gemini" value="gemini" checked>
          Gemini
        </label>
        <label>
          <input type="checkbox" id="chk-summary-chatgpt" value="chatgpt">
          ChatGPT
        </label>
        <label>
          <input type="checkbox" id="chk-summary-claude" value="claude">
          Claude
        </label>
        <label>
          <input type="checkbox" id="chk-summary-perplexity" value="perplexity">
          Perplexity
        </label>
      </div>

      <!-- まとめ指示テキストエリア -->
      <textarea id="summary-prompt">各種生成AIの回答をまとめてください。</textarea>

      <div class="btn-row">
        <button id="summary-submit-btn">送信</button>
        <button id="summary-retry-btn" disabled>再取得</button>
      </div>
      <div id="summary-status"></div>

    </div>

  </div><!-- /.main-layout -->

  <!-- まとめ結果表示エリア -->
  <div id="summary-result"></div>

  <div id="history"></div>

  <script src="generative.js"></script>
</body>

</html>
